<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url | relative_url }}">
  <meta property="og:locale" content="{{ site.lang | default: 'es_ES' }}">
  <meta property="og:image" content="https://avatars.githubusercontent.com/u/104364638?v=4">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">

  <!-- Preconnect avatars -->
  <link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin>

  <link rel="canonical" href="{{ site.url }}{{ page.url | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar al contenido</a>

  <button
    class="theme-toggle"
    aria-label="Activar modo oscuro"
    aria-pressed="false"
    data-theme-toggle
  >◐</button>

  {{ content }}

  <script>
    (function() {
      var btn = document.querySelector('[data-theme-toggle]');
      var root = document.documentElement;

      function updateLabel() {
        var isDark = root.getAttribute('data-theme') === 'dark';
        btn.setAttribute('aria-pressed', isDark);
        btn.setAttribute('aria-label', isDark ? 'Activar modo claro' : 'Activar modo oscuro');
      }

      updateLabel();

      btn.addEventListener('click', function() {
        var current = root.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateLabel();
      });
    })();
  </script>
</body>
</html>
