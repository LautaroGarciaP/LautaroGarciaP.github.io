<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url | relative_url }}">
  <meta property="og:locale" content="en_US">
  <meta property="og:image" content="https://avatars.githubusercontent.com/u/104364638?v=4">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">

  <!-- Preconnect avatars -->
  <link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin>

  <link rel="canonical" href="{{ site.url }}{{ page.url | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <script>
    (function() {
      // Theme
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);

      // Language — default English
      var lang = localStorage.getItem('lang') || 'en';
      document.documentElement.setAttribute('data-lang', lang);
    })();
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav class="controls" aria-label="Site controls">
    <button
      class="lang-toggle"
      aria-label="Switch to Spanish"
      data-lang-toggle
    >ES</button>
    <button
      class="theme-toggle"
      aria-label="Toggle dark mode"
      aria-pressed="false"
      data-theme-toggle
    >◐</button>
  </nav>

  {{ content }}

  <script>
    (function() {
      var langBtn = document.querySelector('[data-lang-toggle]');
      var themeBtn = document.querySelector('[data-theme-toggle]');
      var root = document.documentElement;

      // --- Language ---
      function applyLang(lang) {
        root.setAttribute('data-lang', lang);
        localStorage.setItem('lang', lang);

        // Show/hide elements
        document.querySelectorAll('[data-lang]').forEach(function(el) {
          el.hidden = el.getAttribute('data-lang') !== lang;
        });

        // Update toggle label
        langBtn.textContent = lang === 'en' ? 'ES' : 'EN';
        langBtn.setAttribute('aria-label',
          lang === 'en' ? 'Cambiar a español' : 'Switch to English'
        );

        // Update html lang
        document.documentElement.lang = lang;
      }

      // Init language
      var currentLang = localStorage.getItem('lang') || 'en';
      applyLang(currentLang);

      langBtn.addEventListener('click', function() {
        var current = root.getAttribute('data-lang');
        var next = current === 'en' ? 'es' : 'en';
        applyLang(next);
      });

      // --- Theme ---
      function updateThemeLabel() {
        var isDark = root.getAttribute('data-theme') === 'dark';
        themeBtn.setAttribute('aria-pressed', isDark);
        themeBtn.setAttribute('aria-label',
          isDark ? 'Activate light mode' : 'Activate dark mode'
        );
      }

      updateThemeLabel();

      themeBtn.addEventListener('click', function() {
        var current = root.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeLabel();
      });
    })();
  </script>
</body>
</html>
